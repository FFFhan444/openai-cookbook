{% extends 'layout.html' %}
{% block content %}
<h1>{{ project.title }}</h1>
<img src="{{ project.image }}" class="img-fluid mb-3" alt="{{ project.title }}">
<p>{{ project.description }}</p>
<p><strong>Tags:</strong> {{ project.tags | join(', ') }}</p>
<a href="{{ url_for('index') }}" class="btn btn-secondary">Back</a>
{% endblock %}
